services:
  postgres:
    image: postgres:18
    container_name: shrikex-postgres-local
    ports:
      - "5433:5432"
    env_file:
      - ../../.env.local
    volumes:
      - postgres_local_data:/var/lib/postgresql
  
  control-plane:
    build:
      context: .
      dockerfile: ../../../control-plane/control-plane.Dockerfile
    container_name: shrikex-control-plane-local
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_local_data:
    name: shrikex_postgres_local_data
