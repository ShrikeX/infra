services: 
  control-plane:
    build:
      context: ../../../control-plane
      dockerfile: control-plane.Dockerfile
    container_name: shrikex-control-plane-local
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.local
    depends_on:
      - postgres
      - redis

volumes:
  postgres_local_data:
    name: shrikex_postgres_local_data
